name: CI (Fast)

on:
  push:
    branches:
      - master
      - "feature/**"
      - "fix/**"
      - "refactor/**"
      - "docs/**"
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --python 3.14

      - name: Install Playwright Chromium
        run: uv run playwright install chromium

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format . --check

      - name: Preflight API healthcheck
        shell: bash
        run: |
          set -euo pipefail
          URL="https://api.yeatwork.ru/subscriptions"
          status="$(curl -sS -o /dev/null -w "%{http_code}" "$URL" || true)"
          if [ "$status" != "200" ]; then
            echo "API preflight failed. Expected HTTP 200 from $URL, got HTTP $status."
            exit 1
          fi
          echo "API preflight is healthy (HTTP 200)."

      - name: Run pytest (PR-safe scope)
        run: uv run pytest -m "unit or pr_safe"
