name: Integration (Live)

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "Which integration scope to run"
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - full
          - mail
          - ui-auth
          - ui-payment
  schedule:
    - cron: "0 2 * * *"

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      VERIFIED_USER_EMAIL: ${{ secrets.VERIFIED_USER_EMAIL }}
      VERIFIED_USER_PASSWORD: ${{ secrets.VERIFIED_USER_PASSWORD }}
      # Mail (IMAP) secrets for live mail e2e (only used when scope=mail)
      MAIL_HOST: ${{ secrets.MAIL_HOST }}
      MAIL_PORT: ${{ secrets.MAIL_PORT }}
      MAIL_EMAIL: ${{ secrets.MAIL_EMAIL }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      MAIL_FOLDER: ${{ secrets.MAIL_FOLDER }}
      TMS_URL: ${{ secrets.TMS_URL }}
      TMS_PRIVATE_TOKEN: ${{ secrets.TMS_PRIVATE_TOKEN }}
      TMS_PROJECT_ID: ${{ secrets.TMS_PROJECT_ID }}
      TMS_CONFIGURATION_ID: ${{ secrets.TMS_CONFIGURATION_ID }}
      TMS_TEST_RUN_NAME: "Daily Run ${{ github.run_number }} / ${{ github.event_name }}"
      TMS_ADAPTER_MODE: ${{ secrets.TMS_ADAPTER_MODE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --python 3.14

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Install Playwright Chromium
        run: uv run playwright install chromium

      - name: Preflight API healthcheck
        shell: bash
        run: |
          set -euo pipefail
          SUBSCRIPTIONS_URL="https://api.yeatwork.ru/subscriptions"
          AUTH_URL="https://api.yeatwork.ru/auth/refresh"
          for attempt in 1 2 3 4 5; do
            subscriptions_status="$(curl --connect-timeout 5 --max-time 15 -sS -o /dev/null -w "%{http_code}" "$SUBSCRIPTIONS_URL" || true)"
            auth_status="$(curl --connect-timeout 5 --max-time 15 -sS -o /dev/null -w "%{http_code}" "$AUTH_URL" || true)"

            if [ "$subscriptions_status" = "200" ] && { [ "$auth_status" = "200" ] || [ "$auth_status" = "401" ] || [ "$auth_status" = "403" ]; }; then
              echo "API preflight is healthy on attempt $attempt (subscriptions=$subscriptions_status, auth=$auth_status)"
              exit 0
            fi
            echo "API preflight not ready (subscriptions=$subscriptions_status, auth=$auth_status), attempt $attempt/5"
            if [ "$attempt" = "5" ]; then
              break
            fi
            sleep 10
          done
          echo "API preflight failed. Expected subscriptions=200 and auth=200/401/403 after 5 attempts."
          exit 1

      - name: Run integration tests with Allure
        id: integration_tests
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          run_ui_auth_smoke() {
            echo "UI auth smoke: login TC 409 + register page + change password TC 113"
            export APP_BASE_URL="${APP_BASE_URL:-https://app.yeatwork.ru}"
            export CI=true
            uv run pytest -q \
              tests/ui/auth/test_login_email_desktop.py::test_login_with_email_and_password_desktop \
              tests/ui/auth/test_register_verify_email_e2e.py::test_register_page_opens \
              tests/ui/settings/test_change_password_desktop.py::test_change_password_settings_desktop \
              --alluredir=allure-results --testit
          }

          run_ui_payment() {
            echo "UI payment: T-Bank subscription checkout (requires VERIFIED_USER_* secrets)"
            : "${VERIFIED_USER_EMAIL:?VERIFIED_USER_EMAIL secret is required for ui-payment}"
            : "${VERIFIED_USER_PASSWORD:?VERIFIED_USER_PASSWORD secret is required for ui-payment}"
            export APP_BASE_URL="${APP_BASE_URL:-https://app.yeatwork.ru}"
            export CI=true
            uv run pytest -q \
              tests/ui/subscription/test_subscription_payment_ui.py \
              --alluredir=allure-results --testit
          }

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.scope }}" = "mail" ]; then
            echo "Running mail e2e (scope=mail): API verify-email + Playwright register→IMAP→onboarding→delete→same-email"
            export RUN_MAIL_INTEGRATION=1
            export APP_BASE_URL="${APP_BASE_URL:-https://app.yeatwork.ru}"
            uv run pytest -q \
              tests/auth/test_auth_verify_email_e2e.py::test_email_verification_e2e \
              tests/ui/auth/test_register_verify_email_e2e.py::test_register_and_verify_email_e2e \
              tests/ui/auth/test_forgot_password_recovery_desktop.py::test_forgot_password_recovery_desktop \
              tests/ui/interview/test_onboarding_flow_e2e.py::test_onboarding_full_flow_e2e \
              --alluredir=allure-results --testit
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.scope }}" = "ui-auth" ]; then
            run_ui_auth_smoke
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.scope }}" = "ui-payment" ]; then
            run_ui_payment
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.scope }}" = "smoke" ]; then
            MARK_EXPR="smoke and integration and not ui"
          else
            MARK_EXPR="integration and not ui"
          fi
          echo "Running pytest with marker expression: ${MARK_EXPR}"
          uv run pytest -m "${MARK_EXPR}" --alluredir=allure-results --testit

          RUN_UI_AFTER_API=false
          if [ "${{ github.event_name }}" = "schedule" ]; then
            RUN_UI_AFTER_API=true
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.scope }}" = "full" ]; then
            RUN_UI_AFTER_API=true
          fi
          if [ "${RUN_UI_AFTER_API}" = "true" ]; then
            run_ui_auth_smoke
            if [ -n "${VERIFIED_USER_EMAIL:-}" ] && [ -n "${VERIFIED_USER_PASSWORD:-}" ]; then
              run_ui_payment
            else
              echo "Skipping UI payment: VERIFIED_USER_EMAIL / VERIFIED_USER_PASSWORD not set"
            fi
          fi

      - name: Generate Allure HTML report
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -d allure-results ] && [ "$(find allure-results -type f | wc -l)" -gt 0 ]; then
            allure generate allure-results --clean -o allure-report
          else
            mkdir -p allure-report
            printf '%s\n' '<html><body><h1>No Allure results were generated</h1></body></html>' > allure-report/index.html
          fi

      - name: Upload allure-results artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_number }}
          path: allure-results
          if-no-files-found: warn
          retention-days: 14

      - name: Upload allure-report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_number }}
          path: allure-report
          if-no-files-found: error
          retention-days: 14

      - name: Fail workflow if integration tests failed
        if: ${{ steps.integration_tests.outcome == 'failure' }}
        run: exit 1

  mail-e2e:
    # Nightly: API verify-email + Playwright register→IMAP + forgot password (TC 115) + onboarding (same-email timing defaults in code).
    # Manual scope=mail runs the same four tests in integration-tests (this job is schedule-only).
    if: ${{ github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "true"
      # Mail (IMAP) secrets for live mail e2e
      MAIL_HOST: ${{ secrets.MAIL_HOST }}
      MAIL_PORT: ${{ secrets.MAIL_PORT }}
      MAIL_EMAIL: ${{ secrets.MAIL_EMAIL }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      MAIL_FOLDER: ${{ secrets.MAIL_FOLDER }}
      RUN_MAIL_INTEGRATION: "1"
      APP_BASE_URL: "https://app.yeatwork.ru"
      TMS_URL: ${{ secrets.TMS_URL }}
      TMS_PRIVATE_TOKEN: ${{ secrets.TMS_PRIVATE_TOKEN }}
      TMS_PROJECT_ID: ${{ secrets.TMS_PROJECT_ID }}
      TMS_CONFIGURATION_ID: ${{ secrets.TMS_CONFIGURATION_ID }}
      TMS_TEST_RUN_NAME: "Daily Mail E2E ${{ github.run_number }} / ${{ github.event_name }}"
      TMS_ADAPTER_MODE: ${{ secrets.TMS_ADAPTER_MODE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --python 3.14

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Install Playwright Chromium
        run: uv run playwright install chromium

      - name: Preflight IMAP configuration
        shell: bash
        run: |
          set -euo pipefail
          : "${MAIL_HOST:?MAIL_HOST secret is required}"
          : "${MAIL_EMAIL:?MAIL_EMAIL secret is required}"
          : "${MAIL_PASSWORD:?MAIL_PASSWORD secret is required}"
          echo "Mail secrets are present. Running mail e2e (API + Playwright)..."

      - name: Preflight API healthcheck
        shell: bash
        run: |
          set -euo pipefail
          SUBSCRIPTIONS_URL="https://api.yeatwork.ru/subscriptions"
          AUTH_URL="https://api.yeatwork.ru/auth/refresh"
          for attempt in 1 2 3 4 5; do
            subscriptions_status="$(curl --connect-timeout 5 --max-time 15 -sS -o /dev/null -w "%{http_code}" "$SUBSCRIPTIONS_URL" || true)"
            auth_status="$(curl --connect-timeout 5 --max-time 15 -sS -o /dev/null -w "%{http_code}" "$AUTH_URL" || true)"

            if [ "$subscriptions_status" = "200" ] && { [ "$auth_status" = "200" ] || [ "$auth_status" = "401" ] || [ "$auth_status" = "403" ]; }; then
              echo "API preflight is healthy on attempt $attempt (subscriptions=$subscriptions_status, auth=$auth_status)"
              exit 0
            fi
            echo "API preflight not ready (subscriptions=$subscriptions_status, auth=$auth_status), attempt $attempt/5"
            if [ "$attempt" = "5" ]; then
              break
            fi
            sleep 10
          done
          echo "API preflight failed. Expected subscriptions=200 and auth=200/401/403 after 5 attempts."
          exit 1

      - name: Run mail e2e with Allure
        id: mail_tests
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          uv run pytest -q \
            tests/auth/test_auth_verify_email_e2e.py::test_email_verification_e2e \
            tests/ui/auth/test_register_verify_email_e2e.py::test_register_and_verify_email_e2e \
            tests/ui/auth/test_forgot_password_recovery_desktop.py::test_forgot_password_recovery_desktop \
            tests/ui/interview/test_onboarding_flow_e2e.py::test_onboarding_full_flow_e2e \
            --alluredir=allure-results --testit

      - name: Generate Allure HTML report
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -d allure-results ] && [ "$(find allure-results -type f | wc -l)" -gt 0 ]; then
            allure generate allure-results --clean -o allure-report
          else
            mkdir -p allure-report
            printf '%s\n' '<html><body><h1>No Allure results were generated</h1></body></html>' > allure-report/index.html
          fi

      - name: Upload allure-results artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-mail-e2e-${{ github.run_number }}
          path: allure-results
          if-no-files-found: warn
          retention-days: 14

      - name: Upload allure-report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-mail-e2e-${{ github.run_number }}
          path: allure-report
          if-no-files-found: error
          retention-days: 14

      - name: Fail workflow if mail e2e failed
        if: ${{ steps.mail_tests.outcome == 'failure' }}
        run: exit 1
